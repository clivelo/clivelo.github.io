{% if page.tags %}
  {% capture tags %}
    {% for tag in page.tags %}
      <span class="label  label--category">#{{ tag }}</span>{% if forloop.last == false %},{% endif %}
    {% endfor %}
  {% endcapture %}
{% endif %}

<small class="small  post-meta">
  <i>{{ tags | append: "&nbsp;&middot;&nbsp;" }}</i>
</small>
